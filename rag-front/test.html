<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #f8fafc;
    }
    h1 {
      color: #1e293b;
    }
    button {
      padding: 8px 16px;
      margin-right: 8px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h1>Simple Test Page</h1>
  <p>This is a simple HTML page without Vue or any frameworks.</p>
  <button onclick="alert('Button clicked!')">Click Me</button>
</body>
</html>
